<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>/*[|template_title|]*/0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400&display=swap" rel="stylesheet" />

        <style>
            html {
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                font-weight: 400;
                font-size: 1rem;
                line-height: 1.6;
                background-color: #ffffff;
                color: #000000;
                transition: background-color 0.3s ease, color 0.3s ease;
            }

            html.dark {
                background-color: #0a0a0a;
                color: #ffffff;
            }

            body {
                margin: 0;
                padding: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-page {
                width: fit-content;
                padding: 0 1.5rem;
                box-sizing: border-box;
            }

            .staticrypt-instructions {
                margin-bottom: 1.5rem;
            }

            .staticrypt-title {
                font-size: 1.4rem;
                font-weight: 400;
                margin: 0 0 0.5rem;
            }

            .staticrypt-subtitle {
                color: #666;
                font-size: 0.9rem;
                margin: 0;
            }

            html.dark .staticrypt-subtitle {
                color: #999;
            }

            .staticrypt-password-container {
                position: relative;
            }

            .staticrypt-password-container input[type="text"] {
                width: 100%;
                padding: 0.75rem;
                padding-right: 2.5rem;
                font-size: 1rem;
                font-family: inherit;
                border: 1px solid #ccc;
                border-radius: 0.25rem;
                background: inherit;
                color: inherit;
                box-sizing: border-box;
                outline: none;
            }

            .staticrypt-password-container input:focus {
                border-color: #666;
            }

            html.dark .staticrypt-password-container input {
                border-color: #666;
            }

            html.dark .staticrypt-password-container input:focus {
                border-color: #999;
            }

            .staticrypt-decrypt-button {
                position: absolute;
                right: 0.5rem;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                cursor: pointer;
                color: #999;
                font-size: 1.8rem;
                font-weight: 200;
                padding: 0.25rem;
                line-height: 1;
                transition: color 0.2s;
            }

            .staticrypt-decrypt-button:hover {
                color: #000;
            }

            html.dark .staticrypt-decrypt-button:hover {
                color: #fff;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.2em solid #ccc;
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            html.dark .staticrypt-spinner {
                border-color: #666;
                border-right-color: transparent;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }
        </style>

        <script>
            var storedTheme = localStorage.getItem('theme');
            var systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            var theme = storedTheme || systemTheme;
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
        </script>
    </head>

    <body>
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-page hidden">
            <div class="staticrypt-instructions">
                <p class="staticrypt-title">/*[|template_title|]*/0</p>
            </div>

            <form id="staticrypt-form" action="#" method="post">
                <div class="staticrypt-password-container">
                    <input
                        id="staticrypt-password"
                        type="text"
                        name="password"
                        autofocus
                    />
                    <button type="submit" class="staticrypt-decrypt-button">&gt;</button>
                </div>
            </form>
        </div>

        <script>
            const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
            const templateError = "/*[|template_error|]*/0",
                templateToggleAltShow = "/*[|template_toggle_show|]*/0",
                templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
                staticryptConfig = /*[|staticrypt_config|]*/ 0;

            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: function (plainHTML) {
                    var parser = new DOMParser();
                    var newDoc = parser.parseFromString(plainHTML, 'text/html');

                    // swap head and body without blanking the page
                    document.head.innerHTML = newDoc.head.innerHTML;
                    document.body.innerHTML = newDoc.body.innerHTML;

                    // copy html element attributes
                    Array.from(newDoc.documentElement.attributes).forEach(function (attr) {
                        document.documentElement.setAttribute(attr.name, attr.value);
                    });

                    // apply dark mode
                    var t = localStorage.getItem('theme');
                    var s = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                    if ((t || s) === 'dark') {
                        document.documentElement.classList.add('dark');
                    }

                    // re-execute scripts since innerHTML doesn't run them
                    document.querySelectorAll('script').forEach(function (old) {
                        var s = document.createElement('script');
                        Array.from(old.attributes).forEach(function (attr) {
                            s.setAttribute(attr.name, attr.value);
                        });
                        s.textContent = old.textContent;
                        old.parentNode.replaceChild(s, old);
                    });
                },
                clearLocalStorageCallback: null,
            };

            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

                if (!isSuccessful) {
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();
                }
            };

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, false);

                if (!isSuccessful) {
                    alert(templateError);
                }
            });
        </script>
    </body>
</html>
